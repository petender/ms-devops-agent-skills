name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate submissions
        run: npm run validate
      - name: Run tests
        run: npm test
      - name: Build site
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://example.github.io' }}
          SITE_BASE: ${{ vars.SITE_BASE || '/ms-devops-agent-skills' }}
        run: npm run build
